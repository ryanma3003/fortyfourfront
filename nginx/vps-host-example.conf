# Example NGINX reverse-proxy config for the HOST VPS
# Place this in /etc/nginx/sites-available/vuefront.conf
# then symlink: ln -s /etc/nginx/sites-available/vuefront.conf /etc/nginx/sites-enabled/
# Replace YOUR_DOMAIN with your actual domain name.

server {
    listen 80;
    server_name YOUR_DOMAIN;
    server_tokens off;

    # Redirect HTTP → HTTPS (remove if not using SSL)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name YOUR_DOMAIN;
    server_tokens off;

    # ── SSL (managed by Certbot / your CA) ───────────────────
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Request limits ───────────────────────────────────────
    client_max_body_size 2m;
    client_body_buffer_size 16k;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 8k;

    # ── Proxy to Docker container ────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:3080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
    }

    # ── Security headers ─────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options           "SAMEORIGIN"            always;
    add_header X-Content-Type-Options    "nosniff"                always;
    add_header X-XSS-Protection          "0"                     always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=(), payment=()" always;

    # ── Block access to hidden files ─────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
