server {
    listen 80;
    server_name localhost;
    server_tokens off;

    root /usr/share/nginx/html;
    index index.html;

    # ── Block access to hidden files (.env, .git, etc.) ──────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ── Healthcheck endpoint (used by Docker HEALTHCHECK) ────
    location = /health {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    # ── Proxy API requests to the backend ────────────────────
    # If your backend runs on the same VPS, replace the proxy_pass
    # target accordingly (e.g. http://backend:8000).
    # If the backend is external, remove this block and let
    # VITE_API_BASE_URL handle it in the frontend build.
    # location /api/ {
    #     proxy_pass         https://admin.kssindustri.site;
    #     proxy_set_header   Host              $host;
    #     proxy_set_header   X-Real-IP         $remote_addr;
    #     proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    #     proxy_set_header   X-Forwarded-Proto $scheme;
    # }

    # ── Static assets caching ────────────────────────────────
    location ~* \.(?:css|js|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp|avif|mp4|webm)$ {
        expires    6M;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    # ── SPA fallback — all routes serve index.html ───────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Security headers ─────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"            always;
    add_header X-Content-Type-Options "nosniff"                always;
    add_header X-XSS-Protection       "0"                     always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy     "camera=(), microphone=(), geolocation=(), payment=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://challenges.cloudflare.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://admin.kssindustri.site https://challenges.cloudflare.com; frame-src https://challenges.cloudflare.com; frame-ancestors 'self';" always;

    # ── Request limits ────────────────────────────────────────
    client_max_body_size 2m;
    client_body_buffer_size 16k;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 8k;

    # ── Gzip ─────────────────────────────────────────────────
    gzip            on;
    gzip_vary       on;
    gzip_proxied    any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/xml+rss
        image/svg+xml;
}
