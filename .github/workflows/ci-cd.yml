name: CI/CD — Build & Deploy to VPS

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: vuefront
  COMPOSE_FILE: docker-compose.yml

jobs:
  # ────────────────────────────────────────────────────────────
  # 1. Code quality — CodeQL analysis
  # ────────────────────────────────────────────────────────────
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: javascript
      - uses: github/codeql-action/analyze@v3

  # ────────────────────────────────────────────────────────────
  # 2. Build Docker image & push to GitHub Container Registry
  # ────────────────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ────────────────────────────────────────────────────────────
  # 3. Deploy to VPS via SSH
  # ────────────────────────────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: [analyze, build]
    environment: production
    steps:
      - name: Deploy to VPS over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -e

            # ── Variables ───────────────────────────────────
            APP_DIR="${{ secrets.VPS_APP_DIR }}"
            IMAGE="ghcr.io/${{ github.repository }}/${{ env.IMAGE_NAME }}:latest"

            # ── Login to GHCR ───────────────────────────────
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u "${{ secrets.GHCR_USER }}" --password-stdin

            # ── Pull latest image ───────────────────────────
            docker pull "$IMAGE"

            # ── Ensure app directory exists ──────────────────
            mkdir -p "$APP_DIR"
            cd "$APP_DIR"

            # ── Write docker-compose.yml on the VPS ─────────
            cat > docker-compose.yml <<'COMPOSE_EOF'
            services:
              vuefront:
                image: IMAGE_PLACEHOLDER
                container_name: vuefront
                restart: unless-stopped
                ports:
                  - "127.0.0.1:3080:80"
                healthcheck:
                  test: ["CMD", "wget", "-qO-", "http://localhost:80/health"]
                  interval: 30s
                  timeout: 3s
                  start_period: 5s
                  retries: 3
                logging:
                  driver: json-file
                  options:
                    max-size: "10m"
                    max-file: "3"
            COMPOSE_EOF

            # Replace placeholder with actual image
            sed -i "s|IMAGE_PLACEHOLDER|${IMAGE}|g" docker-compose.yml

            # ── Deploy ──────────────────────────────────────
            docker compose pull
            docker compose up -d --force-recreate --remove-orphans

            # ── Cleanup old images ──────────────────────────
            docker image prune -af --filter "until=168h"

            echo "✅ Deployment complete"
