name: CI/CD — Build & Deploy to VPS

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: fortyfour-front
  COMPOSE_FILE: docker-compose.yml

jobs:
  # ────────────────────────────────────────────────────────────
  # 1. Code quality — CodeQL analysis
  # ────────────────────────────────────────────────────────────
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: javascript
      - uses: github/codeql-action/analyze@v3

  # ────────────────────────────────────────────────────────────
  # 2. Build Docker image & push to GitHub Container Registry
  # ────────────────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL }}
            TURNSTILE_SITE_KEY=${{ secrets.TURNSTILE_SITE_KEY }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ────────────────────────────────────────────────────────────
  # 3. Deploy to VPS via SSH
  # ────────────────────────────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: [analyze, build]
    environment: production
    steps:
      - name: Connect runner to Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
          ping: ${{ secrets.VPS_TAILSCALE_HOST }}

      - name: Set up SSH key
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Trust VPS host key over Tailscale
        run: |
          ssh-keyscan -p "${{ secrets.VPS_PORT }}" "${{ secrets.VPS_TAILSCALE_HOST }}" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Deploy to VPS over SSH over Tailscale
        run: |
          ssh \
            -i ~/.ssh/id_ed25519 \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=yes \
            -p "${{ secrets.VPS_PORT }}" \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_TAILSCALE_HOST }}" /bin/sh <<'EOF'
          set -e

          APP_DIR="${{ secrets.VPS_APP_DIR }}"
          IMAGE="ghcr.io/${{ github.repository }}/${{ env.IMAGE_NAME }}:latest"

          echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u "${{ secrets.GHCR_USER }}" --password-stdin
          docker pull "$IMAGE"

          mkdir -p "$APP_DIR" || { echo "Cannot create $APP_DIR"; exit 1; }
          cd "$APP_DIR"

          cat > docker-compose.yml <<'COMPOSE_EOF'
          services:
            fortyfour-front:
              image: IMAGE_PLACEHOLDER
              container_name: fortyfour-front
              restart: unless-stopped
              ports:
                - "127.0.0.1:3080:3080"
              healthcheck:
                test: ["CMD", "wget", "-qO-", "http://localhost:3080/"]
                interval: 30s
                timeout: 3s
                start_period: 5s
                retries: 3
              logging:
                driver: json-file
                options:
                  max-size: "10m"
                  max-file: "3"
          COMPOSE_EOF

          sed -i "s|IMAGE_PLACEHOLDER|${IMAGE}|g" docker-compose.yml
          docker compose pull
          docker compose up -d --force-recreate --remove-orphans
          docker image prune -af --filter "until=168h"
          echo "Deployment complete"
          EOF
